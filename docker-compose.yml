version: "3.8"

services:
  # NestJS Microservices
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./services/api-gateway:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - kafka
      - redis
    env_file:
      - .env
    environment:
      - API_GATEWAY_PORT=${API_GATEWAY_PORT}
    networks:
      - microservice-network

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    volumes:
      - ./services/user-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - kafka
      - redis
      - postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${USER_SERVICE_DB}
      - USER_SERVICE_PORT=${USER_SERVICE_PORT}
    networks:
      - microservice-network

  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    volumes:
      - ./services/product-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - kafka
      - redis
      - postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${PRODUCT_SERVICE_DB}
      - PRODUCT_SERVICE_PORT=${PRODUCT_SERVICE_PORT}
    networks:
      - microservice-network

  logger-service:
    build:
      context: ./services/logger-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    volumes:
      - ./services/logger-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - kafka
      - elasticsearch
      - logstash
    env_file:
      - .env
    environment:
      - LOGGER_SERVICE_PORT=${LOGGER_SERVICE_PORT}
    networks:
      - microservice-network

  # Message Broker
  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
    depends_on:
      - zookeeper
    networks:
      - microservice-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    ports:
      - "${ZOOKEEPER_CLIENT_PORT}:${ZOOKEEPER_CLIENT_PORT}"
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
    networks:
      - microservice-network

  # Cache
  redis:
    image: redis:alpine
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    networks:
      - microservice-network

  # Database
  postgres:
    image: postgres:13-alpine
    ports:
      - "5432:5432"
    environment:
      DB_HOST: postgres # Use Docker service name
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/create-multiple-postgresql-databases.sh:/docker-entrypoint-initdb.d/create-multiple-postgresql-databases.sh
    networks:
      - microservice-network

  # ELK Stack
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.14.0
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=${ELASTICSEARCH_JAVA_OPTS}
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - microservice-network

  logstash:
    image: docker.elastic.co/logstash/logstash:7.14.0
    ports:
      - "5000:5000"
      - "9600:9600"
    volumes:
      - ./config/logstash/pipeline:/usr/share/logstash/pipeline
    depends_on:
      - elasticsearch
    networks:
      - microservice-network

  kibana:
    image: docker.elastic.co/kibana/kibana:7.14.0
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: ${KIBANA_ELASTICSEARCH_HOSTS}
    depends_on:
      - elasticsearch
    networks:
      - microservice-network

  # Monitoring
  grafana:
    image: grafana/grafana:latest
    ports:
      - "9999:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - microservice-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - microservice-network

networks:
  microservice-network:
    driver: bridge

volumes:
  postgres-data:
  elasticsearch-data:
  grafana-data:
  prometheus-data:

